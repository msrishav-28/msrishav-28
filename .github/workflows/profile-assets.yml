name: Weekly Profile Assets

on:
  schedule:
    - cron: "0 3 * * 0" # Weekly, Sunday 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: msrishav-28
        with:
          setting-json: |
            {
              "type": "night-green",
              "backgroundColor": "#0d1117",
              "foregroundColor": "#00ff41",
              "strongColor": "#00ff41",
              "weakColor": "#00661a",
              "radarColor": "#00ff41",
              "growingAnimation": true,
              "contribColors": [
                "#0d1117",
                "#00661a",
                "#009929",
                "#00cc33",
                "#00ff41"
              ]
            }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Matrix profile visuals
        run: python .github/scripts/generate_profile_visuals.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PROFILE_USERNAME: msrishav-28

      - name: Commit weekly asset refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/matrix-languages.svg assets/matrix-achievements.svg profile-3d-contrib
          git diff --cached --quiet && echo "No profile asset changes to commit" || git commit -m "Refresh profile assets [skip ci]"
          git push
