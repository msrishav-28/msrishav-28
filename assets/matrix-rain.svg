<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rainPanel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#07110b"/>
      <stop offset="50%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#07110b"/>
    </linearGradient>
    <filter id="rainGlow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "Courier New", monospace; }
      .stream { fill: #00FF41; font-size: 13px; opacity: .52; filter: url(#rainGlow); }
      .dim { fill: #007F25; font-size: 12px; opacity: .34; }
      @keyframes fall {
        0% { transform: translateY(-80px); opacity: .08; }
        28% { opacity: .65; }
        100% { transform: translateY(115px); opacity: .12; }
      }
      .c1 { animation: fall 7s linear infinite; }
      .c2 { animation: fall 9s linear infinite; animation-delay: -3s; }
      .c3 { animation: fall 6s linear infinite; animation-delay: -1.5s; }
      .c4 { animation: fall 8s linear infinite; animation-delay: -4s; }
    </style>
  </defs>
  <rect width="900" height="160" rx="8" fill="#0d1117"/>
  <rect x="18" y="18" width="864" height="124" rx="6" fill="url(#rainPanel)" stroke="#00FF41" stroke-opacity=".24"/>
  <text x="42" y="45" class="mono" font-size="14" font-weight="700" fill="#00FF41">&gt; MATRIX_BACKDROP</text>
  <text x="42" y="67" class="mono" font-size="11" fill="#7CFF6B">Theme layer only: subtle motion, no fanpage overload.</text>

  <g class="mono">
    <text x="250" y="38" class="stream c1">0101 1100 0011 1010 0110</text>
    <text x="350" y="90" class="dim c2">AI ML CV RAG SQL API UX</text>
    <text x="515" y="50" class="stream c3">1011 0010 1110 0101 1001</text>
    <text x="655" y="105" class="dim c4">BUILD TEST SHIP LEARN</text>
    <text x="770" y="58" class="stream c2">0110 1111 0001</text>
  </g>

  <path d="M42 112 H858" stroke="#00FF41" stroke-opacity=".18"/>
  <text x="42" y="132" class="mono" font-size="10" fill="#7CFF6B">signal: restrained visual identity | cadence: weekly asset refresh</text>
</svg>
